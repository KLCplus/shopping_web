<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyPetStore - Welcome</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a2a3a 0%, #0d1b2a 50%, #2c3e50 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            overflow: hidden;
            position: relative;
        }

        /* 烟花画布 */
        #fireworksCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* 背景装饰元素 */
        .bg-element {
            position: absolute;
            z-index: 1;
            opacity: 0.6;
            animation: float 20s infinite linear;
        }

        .bg-element:nth-child(1) {
            top: 5%;
            left: 5%;
            font-size: 40px;
            animation-delay: 0s;
        }

        .bg-element:nth-child(2) {
            top: 15%;
            right: 8%;
            font-size: 50px;
            animation-delay: 2s;
        }

        .bg-element:nth-child(3) {
            bottom: 20%;
            left: 7%;
            font-size: 35px;
            animation-delay: 4s;
        }

        .bg-element:nth-child(4) {
            bottom: 15%;
            right: 5%;
            font-size: 45px;
            animation-delay: 6s;
        }

        .bg-element:nth-child(5) {
            top: 25%;
            left: 15%;
            font-size: 30px;
            animation-delay: 8s;
        }

        .bg-element:nth-child(6) {
            top: 40%;
            right: 12%;
            font-size: 55px;
            animation-delay: 10s;
        }

        .bg-element:nth-child(7) {
            top: 60%;
            left: 12%;
            font-size: 40px;
            animation-delay: 12s;
        }

        .bg-element:nth-child(8) {
            top: 70%;
            right: 15%;
            font-size: 35px;
            animation-delay: 14s;
        }

        @keyframes float {
            0% {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 0.6;
            }
            25% {
                transform: translateY(-20px) rotate(90deg) scale(1.1);
            }
            50% {
                transform: translateY(0) rotate(180deg) scale(1);
                opacity: 0.8;
            }
            75% {
                transform: translateY(20px) rotate(270deg) scale(1.1);
            }
            100% {
                transform: translateY(0) rotate(360deg) scale(1);
                opacity: 0.6;
            }
        }

        /* 主容器样式 */
        #Content {
            max-width: 420px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            transition: all 0.4s ease;
            position: relative;
            z-index: 10;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        #Content:hover {
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(76, 175, 80, 0.2);
            transform: translateY(-8px) scale(1.02);
        }

        /* 顶部装饰图 */
        .top-image {
            height: 220px;
            background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%);
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
        }

        .image-overlay {
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .pet-icons {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .pet-icon {
            position: absolute;
            font-size: 24px;
            color: rgba(255, 255, 255, 0.7);
            animation: bounce 3s infinite ease-in-out;
        }

        .pet-icon:nth-child(1) {
            top: 20%;
            left: 15%;
            animation-delay: 0s;
        }

        .pet-icon:nth-child(2) {
            top: 30%;
            right: 20%;
            animation-delay: 0.5s;
        }

        .pet-icon:nth-child(3) {
            bottom: 25%;
            left: 25%;
            animation-delay: 1s;
        }

        .pet-icon:nth-child(4) {
            bottom: 15%;
            right: 15%;
            animation-delay: 1.5s;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .paw-icon {
            color: white;
            font-size: 120px;
            filter: drop-shadow(0 6px 8px rgba(0, 0, 0, 0.2));
            animation: pulse 2s infinite alternate, rotate 10s infinite linear;
            z-index: 2;
            position: relative;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            100% {
                transform: scale(1.1);
            }
        }

        @keyframes rotate {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* 内容区样式 */
        .content-area {
            padding: 40px;
            text-align: center;
            position: relative;
        }

        .welcome-title {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #2E7D32, #4CAF50);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 30px;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            position: relative;
            display: inline-block;
        }

        .welcome-title::after {
            content: '';
            display: block;
            width: 80px;
            height: 4px;
            background: linear-gradient(to right, #4CAF50, #2E7D32);
            margin: 12px auto;
            border-radius: 4px;
            animation: linePulse 2s infinite alternate;
        }

        @keyframes linePulse {
            0% {
                width: 80px;
                opacity: 0.7;
            }
            100% {
                width: 120px;
                opacity: 1;
            }
        }

        .enter-btn {
            display: inline-block;
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            color: white;
            font-weight: 600;
            padding: 16px 40px;
            border-radius: 50px;
            box-shadow: 0 8px 20px rgba(76, 175, 80, 0.4);
            text-decoration: none;
            margin-bottom: 35px;
            width: 100%;
            max-width: 250px;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .enter-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: 0.6s;
        }

        .enter-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(76, 175, 80, 0.6);
            letter-spacing: 2px;
        }

        .enter-btn:hover::before {
            left: 100%;
        }

        .btn-icon {
            margin-right: 10px;
            transition: transform 0.3s ease;
        }

        .enter-btn:hover .btn-icon {
            transform: scale(1.2) rotate(10deg);
        }

        .copyright {
            color: #6b7280;
            font-size: 13px;
            margin-top: 20px;
        }

        .copyright sub {
            vertical-align: sub;
            font-size: smaller;
        }

        /* 粒子效果 */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 星星效果 */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            animation: twinkle 5s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 0.2;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        /* 浮动文字效果 */
        .floating-text {
            position: absolute;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-weight: 600;
            z-index: 1;
            animation: floatText 15s infinite linear;
            text-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }

        .floating-text:nth-child(1) {
            top: 10%;
            left: 5%;
            animation-delay: 0s;
        }

        .floating-text:nth-child(2) {
            top: 20%;
            right: 5%;
            animation-delay: 3s;
        }

        .floating-text:nth-child(3) {
            bottom: 15%;
            left: 10%;
            animation-delay: 6s;
        }

        .floating-text:nth-child(4) {
            bottom: 25%;
            right: 10%;
            animation-delay: 9s;
        }

        @keyframes floatText {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* 音乐控制按钮 */
        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: #4CAF50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .music-control:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
        }

        .music-control.muted {
            background: #ff5252;
        }

        /* 音乐播放器样式 */
        .music-player {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 200px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.2);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
            pointer-events: none;
        }

        .music-player.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        .song-info {
            text-align: center;
            margin-bottom: 10px;
        }

        .song-title {
            font-size: 14px;
            font-weight: 600;
            color: white;
            margin-bottom: 3px;
        }

        .artist {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }

        .visualizer {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 40px;
            margin: 10px 0;
            gap: 3px;
        }

        .bar {
            width: 4px;
            background: linear-gradient(to top, #4CAF50, #2E7D32);
            border-radius: 2px 2px 0 0;
            animation: pulse 1.5s ease-in-out infinite;
            animation-delay: calc(var(--i) * 0.1s);
        }

        @keyframes pulse {
            0%, 100% {
                height: 5px;
            }
            50% {
                height: 20px;
            }
        }

        /* 响应式调整 */
        @media (max-width: 480px) {
            #Content {
                max-width: 90%;
            }

            .welcome-title {
                font-size: 2rem;
            }

            .content-area {
                padding: 30px 20px;
            }

            .top-image {
                height: 180px;
            }

            .paw-icon {
                font-size: 80px;
            }

            .music-player {
                width: 160px;
                right: 10px;
                bottom: 70px;
            }
        }
    </style>
</head>
<body>
<!-- 烟花画布 -->
<canvas id="fireworksCanvas"></canvas>

<!-- 粒子效果容器 -->
<div id="particles-js"></div>

<!-- 背景装饰元素 -->
<div class="bg-element">🐶</div>
<div class="bg-element">🐱</div>
<div class="bg-element">🐠</div>
<div class="bg-element">🐹</div>
<div class="bg-element">🐦</div>
<div class="bg-element">🐢</div>
<div class="bg-element">🐍</div>
<div class="bg-element">🐭</div>

<!-- 浮动文字 -->
<div class="floating-text">Pets</div>
<div class="floating-text">Love</div>
<div class="floating-text">Care</div>
<div class="floating-text">Fun</div>

<!-- 音乐播放器 -->
<div class="music-player" id="musicPlayer">
    <div class="song-info">
        <div class="song-title">月光奏鸣曲</div>
        <div class="artist">贝多芬</div>
    </div>
    <div class="visualizer">
        <div class="bar" style="--i: 0"></div>
        <div class="bar" style="--i: 1"></div>
        <div class="bar" style="--i: 2"></div>
        <div class="bar" style="--i: 3"></div>
        <div class="bar" style="--i: 4"></div>
        <div class="bar" style="--i: 5"></div>
        <div class="bar" style="--i: 6"></div>
        <div class="bar" style="--i: 7"></div>
        <div class="bar" style="--i: 8"></div>
        <div class="bar" style="--i: 9"></div>
    </div>
</div>

<!-- 音乐控制按钮 -->
<div class="music-control" id="musicControl">
    <i class="fa fa-volume-up"></i>
</div>

<!-- 主容器 -->
<div id="Content">
    <!-- 顶部装饰图 -->
    <div class="top-image">
        <div class="image-overlay">
            <div class="pet-icons">
                <div class="pet-icon">🐕</div>
                <div class="pet-icon">🐈</div>
                <div class="pet-icon">🐠</div>
                <div class="pet-icon">🐇</div>
            </div>
            <i class="fa fa-paw paw-icon"></i>
        </div>
    </div>

    <!-- 内容区 -->
    <div class="content-area">
        <h2 class="welcome-title">Welcome to MyPetStore</h2>

        <a href="signOn Form" class="enter-btn">
            <i class="fa fa-shopping-bag btn-icon"></i> Enter the Store
        </a>

        <p class="copyright">
            <sub>Copyright © 2023 MyPetStore. All rights reserved.</sub>
        </p>
    </div>
</div>

<!-- 背景音乐 -->
<audio id="background-music" loop>
    <!-- 使用公开可用的音乐文件 -->
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    您的浏览器不支持音频元素。
</audio>

<!-- 引入particles.js -->
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>
    // 音频处理
    document.addEventListener('DOMContentLoaded', function() {
        const bgMusic = document.getElementById('background-music');
        const musicControl = document.getElementById('musicControl');
        const musicPlayer = document.getElementById('musicPlayer');
        let userInteracted = false;
        let musicPlayerVisible = false;

        // 初始化音频状态
        function initAudio() {
            // 设置音量
            bgMusic.volume = 0.5;

            // 监听音频加载错误
            bgMusic.addEventListener('error', function(e) {
                console.error('音频加载错误:', e);
                showAudioError();
            });

            // 监听音频加载成功
            bgMusic.addEventListener('canplaythrough', function() {
                console.log('音频加载成功');
            });

            // 添加用户交互事件监听器
            document.addEventListener('click', function() {
                if (!userInteracted) {
                    userInteracted = true;
                    tryPlayMusic();
                }
            }, { once: true });

            // 音乐控制按钮点击事件
            musicControl.addEventListener('click', function() {
                if (bgMusic.paused) {
                    tryPlayMusic();
                } else {
                    bgMusic.pause();
                    musicControl.classList.add('muted');
                    musicControl.innerHTML = '<i class="fa fa-volume-off"></i>';
                    hideMusicPlayer();
                }
            });

            // 鼠标悬停显示音乐播放器
            musicControl.addEventListener('mouseenter', function() {
                if (!bgMusic.paused) {
                    showMusicPlayer();
                }
            });

            // 鼠标离开隐藏音乐播放器
            musicPlayer.addEventListener('mouseleave', function() {
                hideMusicPlayer();
            });
        }

        // 显示音乐播放器
        function showMusicPlayer() {
            musicPlayer.classList.add('show');
            musicPlayerVisible = true;
        }

        // 隐藏音乐播放器
        function hideMusicPlayer() {
            musicPlayer.classList.remove('show');
            musicPlayerVisible = false;
        }

        // 尝试播放音乐
        function tryPlayMusic() {
            if (!userInteracted) return;

            bgMusic.play().then(function() {
                console.log('音乐播放成功');
                musicControl.classList.remove('muted');
                musicControl.innerHTML = '<i class="fa fa-volume-up"></i>';
                showMusicPlayer();

                // 5秒后自动隐藏播放器
                setTimeout(function() {
                    if (musicPlayerVisible) {
                        hideMusicPlayer();
                    }
                }, 5000);
            }).catch(function(error) {
                console.error('音乐播放失败:', error);
                showAudioError();
            });
        }

        // 显示音频错误提示
        function showAudioError() {
            musicControl.style.background = '#ff5252';
            musicControl.innerHTML = '<i class="fa fa-exclamation-triangle"></i>';
            musicControl.title = '音频加载失败，请检查文件路径';
        }

        // 初始化音频
        initAudio();

        // 烟花效果实现
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');

        // 设置画布尺寸
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 烟花粒子类
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.velocity = {
                    x: (Math.random() - 0.5) * 10,
                    y: (Math.random() - 0.5) * 10
                };
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.015;
                this.size = Math.random() * 3 + 1;
                this.gravity = 0.05;
                this.friction = 0.98;
            }

            update() {
                this.velocity.y += this.gravity;
                this.velocity.x *= this.friction;
                this.velocity.y *= this.friction;
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= this.decay;
            }

            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 烟花类
        class Firework {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.particles = [];
                this.colors = [
                    '#4CAF50', '#2E7D32', '#FF9800', '#E91E63',
                    '#9C27B0', '#2196F3', '#00BCD4', '#FFEB3B'
                ];
                this.color = this.colors[Math.floor(Math.random() * this.colors.length)];

                // 创建粒子
                const particleCount = 150 + Math.floor(Math.random() * 50);
                for (let i = 0; i < particleCount; i++) {
                    this.particles.push(new Particle(this.x, this.y, this.color));
                }
            }

            update() {
                this.particles.forEach((particle, index) => {
                    if (particle.alpha <= 0) {
                        this.particles.splice(index, 1);
                    } else {
                        particle.update();
                    }
                });
            }

            draw() {
                this.particles.forEach(particle => {
                    particle.draw();
                });
            }
        }

        let fireworks = [];

        // 创建随机烟花
        function createRandomFirework() {
            const x = Math.random() * canvas.width;
            const y = Math.random() * canvas.height * 0.5;
            fireworks.push(new Firework(x, y));
        }

        // 动画循环
        function animate() {
            // 清除画布并添加半透明背景以实现拖尾效果
            ctx.fillStyle = 'rgba(13, 27, 42, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 随机生成新烟花
            if (Math.random() < 0.08) {
                createRandomFirework();
            }

            // 更新和绘制所有烟花
            fireworks.forEach((firework, index) => {
                firework.update();
                firework.draw();

                // 移除没有粒子的烟花
                if (firework.particles.length === 0) {
                    fireworks.splice(index, 1);
                }
            });

            requestAnimationFrame(animate);
        }

        animate();

        // 初始化粒子背景
        if (typeof particlesJS !== 'undefined') {
            particlesJS('particles-js', {
                particles: {
                    number: { value: 80, density: { enable: true, value_area: 800 } },
                    color: { value: "#4CAF50" },
                    shape: { type: "circle" },
                    opacity: { value: 0.5, random: true },
                    size: { value: 3, random: true },
                    line_linked: {
                        enable: true,
                        distance: 150,
                        color: "#4CAF50",
                        opacity: 0.2,
                        width: 1
                    },
                    move: {
                        enable: true,
                        speed: 2,
                        direction: "none",
                        random: true,
                        straight: false,
                        out_mode: "out",
                        bounce: false
                    }
                },
                interactivity: {
                    detect_on: "canvas",
                    events: {
                        onhover: { enable: true, mode: "repulse" },
                        onclick: { enable: true, mode: "push" },
                        resize: true
                    }
                },
                retina_detect: true
            });
        }

        // 添加星星背景
        function createStars() {
            const starsContainer = document.createElement('div');
            starsContainer.className = 'stars';
            document.body.appendChild(starsContainer);

            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = Math.random() * 4 + 'px';
                star.style.height = star.style.width;
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 5 + 's';
                starsContainer.appendChild(star);
            }
        }

        createStars();
    });
</script>
</body>
</html>
